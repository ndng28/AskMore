upstream askmore_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Reasonable upload size — rounds are tiny JSON payloads.
    client_max_body_size 16k;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # HSTS — only meaningful when fronted by TLS. Uncomment after
    # cert provisioning.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Hide nginx version
    server_tokens off;

    # Logging to stdout for the container driver to pick up.
    access_log /var/log/nginx/askmore.access.log;
    error_log  /var/log/nginx/askmore.error.log warn;

    location / {
        proxy_pass http://askmore_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Cache static game assets aggressively.
    location ~* \.(js|css|svg|woff2?)$ {
        proxy_pass http://askmore_app;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
