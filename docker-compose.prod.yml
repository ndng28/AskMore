# Production overrides for askmore. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file tightens the dev defaults (docker-compose.yml) for
# single-host production: env_file, named volume, log rotation,
# stricter restart policy, and an explicit deploy weight.
services:
  avni-math:
    build:
      context: .
      dockerfile: Dockerfile
    image: askmore:latest
    container_name: askmore
    env_file:
      - .env
    ports:
      # Bind to loopback only — front this with a reverse proxy on the host.
      - '127.0.0.1:8080:3000'
    restart: always
    read_only: true
    tmpfs:
      # node:sqlite needs write access for the WAL files even when
      # the root FS is read-only.
      - /app/data:size=16M,mode=1777,uid=1000,gid=1000
      - /tmp:size=16M,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    volumes:
      # Named volume for the SQLite database. Persists across
      # `docker compose down`; only wiped on `docker volume rm`.
      - askmore-data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:3000/api/users']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
        labels: service=askmore
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M

volumes:
  askmore-data:
    name: askmore-data
