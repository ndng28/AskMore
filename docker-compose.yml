services:
  avni-math:
    build: .
    ports:
      - '127.0.0.1:8080:3000'
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://localhost:3000/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
